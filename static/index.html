<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hum2Song</title>
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#0f141b;
      color:#e7edf6;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }
    .card{
      width:min(460px, calc(100% - 32px));
      border:1px solid rgba(255,255,255,.12);
      border-radius:12px;
      background:rgba(255,255,255,.04);
      padding:20px;
      box-sizing:border-box;
    }
    h1{ margin:0 0 8px; font-size:20px; }
    p{ margin:0 0 14px; color:#a8b3c7; line-height:1.45; font-size:14px; }
    a{
      display:inline-block;
      padding:10px 14px;
      border-radius:10px;
      text-decoration:none;
      font-weight:700;
      color:#fff;
      background:#2563eb;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Hum2Song Studio</h1>
    <p>Quick entry / 快速入口：open Studio to start recording or importing audio.<br/>点击进入 Studio，开始录音或导入音频。</p>
    <a href="/ui">Open Studio</a>
  </main>
</body>
</html>
